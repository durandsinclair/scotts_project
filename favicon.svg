<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- grass -->
  <rect width="16" height="16" fill="#4a7c3f"/>
  <!-- path tile under feet -->
  <rect x="4" y="12" width="8" height="4" fill="#c4a468"/>
  <!-- shadow -->
  <rect x="5" y="14" width="6" height="1" fill="#2d5a25"/>
  <!-- shoes -->
  <rect x="4" y="13" width="4" height="1" fill="#221100"/>
  <rect x="8" y="13" width="4" height="1" fill="#221100"/>
  <!-- legs -->
  <rect x="5" y="10" width="3" height="3" fill="#334466"/>
  <rect x="8" y="10" width="3" height="3" fill="#334466"/>
  <!-- body -->
  <rect x="4" y="5" width="8" height="5" fill="#2255bb"/>
  <!-- arms -->
  <rect x="2" y="5" width="2" height="4" fill="#2255bb"/>
  <rect x="12" y="5" width="2" height="4" fill="#2255bb"/>
  <!-- hands -->
  <rect x="2" y="9" width="2" height="1" fill="#f5c08a"/>
  <rect x="12" y="9" width="2" height="1" fill="#f5c08a"/>
  <!-- face -->
  <rect x="5" y="1" width="6" height="5" fill="#f5c08a"/>
  <!-- hair -->
  <rect x="5" y="1" width="6" height="2" fill="#5c3317"/>
  <!-- eyes -->
  <rect x="6" y="4" width="1" height="1" fill="#1a1a1a"/>
  <rect x="9" y="4" width="1" height="1" fill="#1a1a1a"/>
</svg>
